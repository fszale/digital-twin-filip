name: Docs And Diagrams

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Embed diagrams
        run: python3 scripts/embed_diagrams.py
      - name: Validate repo docs
        run: python3 scripts/validate_repo.py
      - name: Fail on uncommitted embed drift
        run: git diff --exit-code
